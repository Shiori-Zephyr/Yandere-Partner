name: Build & Release

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  PLUGIN_NAME: YanderePartner
  TZ: Asia/Tokyo

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Set timezone
        run: Set-TimeZone -Id "Tokyo Standard Time"

      - name: Build
        run: dotnet build ${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_NAME }}.csproj -c Release -maxcpucount:1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ${{ env.PLUGIN_NAME }}/bin/Release/

      - name: Zip release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path .\${{ env.PLUGIN_NAME }}\bin\Release\* -DestinationPath .\${{ env.PLUGIN_NAME }}.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ env.PLUGIN_NAME }}.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
